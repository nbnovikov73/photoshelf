services:
  caddy:
    image: caddy:2-alpine
    container_name: photoshelf-caddy
    restart: unless-stopped
    env_file:
      - ${PHOTOSHELF_ENV_FILE:-.env.production}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photoshelf-web
    restart: unless-stopped
    env_file:
      - ${PHOTOSHELF_ENV_FILE:-.env.production}
    expose:
      - "4321"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    container_name: photoshelf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-photoshelf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-photoshelf}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-photoshelf} -d ${POSTGRES_DB:-photoshelf}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: photoshelf-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: photoshelf-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}
      && (mc mb -p local/${S3_BUCKET} || true)
      && mc anonymous set download local/${S3_BUCKET}"

volumes:
  caddy-config:
  caddy-data:
  minio-data:
  postgres-data:
